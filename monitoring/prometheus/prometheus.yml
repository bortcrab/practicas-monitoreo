global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'django'
    static_configs:
      - targets: ['172.17.0.1:8000']

  - job_name: 'laravel'
    static_configs:
      - targets: ['172.17.0.1:8001']
    metrics_path: '/metrics'
