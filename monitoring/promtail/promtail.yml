server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: apache_access
    static_configs:
      - targets:
          - localhost
        labels:
          job: apache_access
          __path__: /var/log/apache2/django_access.log

  - job_name: apache_access_laravel
    static_configs:
      - targets:
          - localhost
        labels:
          job: apache_access
          __path__: /var/log/apache2/evolved_access.log

  - job_name: apache_error
    static_configs:
      - targets:
          - localhost
        labels:
          job: apache_error
          __path__: /var/log/apache2/django_error.log

  - job_name: apache_error_laravel
    static_configs:
      - targets:
          - localhost
        labels:
          job: apache_error
          __path__: /var/log/apache2/evolved_error.log
