# PONER ESTO EN /etc/apache2/sites-available
<VirtualHost *:80>
    ServerName 192.168.1.154

    # ── Frontend React (raíz del sitio) ──────────────────────────
    ProxyPreserveHost On

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:5173/$1 [P,L]

    ProxyPass        /api/  http://127.0.0.1:8000/api/
    ProxyPassReverse /api/  http://127.0.0.1:8000/api/

    # Si Django también sirve /admin y /static de Django
    ProxyPass        /admin/  http://127.0.0.1:8000/admin/
    ProxyPassReverse /admin/  http://127.0.0.1:8000/admin/

    ProxyPass        /static-django/  http://127.0.0.1:8000/static/
    ProxyPassReverse /static-django/  http://127.0.0.1:8000/static/

    # Todo lo demás → React
    ProxyPass        /  http://127.0.0.1:5173/
    ProxyPassReverse /  http://127.0.0.1:5173/

    # Cabeceras para que Django sepa que viene de un proxy
    RequestHeader set X-Forwarded-Proto "http"

    ErrorLog  ${APACHE_LOG_DIR}/mi-proyecto-error.log
    CustomLog ${APACHE_LOG_DIR}/mi-proyecto-access.log combined
</VirtualHost>
